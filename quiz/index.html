<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moth Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background-color: #faf9f7; color: #2d2d2d; padding: 40px 20px 100px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Hamburger Menu */
        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .menu-toggle span { display: block; width: 20px; height: 2px; background: #2d2d2d; margin: 4px 0; }
        .menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: left 0.3s; z-index: 999; padding: 80px 20px 20px; }
        .menu.open { left: 0; }
        .menu a { display: block; padding: 15px 10px; color: #2d2d2d; text-decoration: none; border-bottom: 1px solid #eee; }
        .menu a:hover { color: #6b705c; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 998; display: none; }
        .menu-overlay.open { display: block; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-weight: normal; font-size: 2em; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1em; margin-bottom: 10px; }
        .score { font-size: 1.2em; color: #6b705c; margin-bottom: 20px; }
        
        .quiz-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px; width: 100%; }
        .quiz-container img { width: 100%; height: 300px; object-fit: cover; }
        .quiz-content { padding: 20px; text-align: center; }
        .question { font-size: 1.2em; margin-bottom: 20px; }
        
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .photo-option { cursor: pointer; border-radius: 8px; overflow: hidden; border: 3px solid transparent; transition: all 0.2s; }
        .photo-option:hover { border-color: #6b705c; }
        .photo-option img { width: 100%; height: 150px; object-fit: cover; }
        .photo-option.correct { border-color: #4CAF50; }
        .photo-option.wrong { border-color: #e74c3c; }
        .photo-option.disabled { pointer-events: none; opacity: 0.6; }
        .photo-option.correct.disabled { opacity: 1; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { background: #f5f5f5; border: 2px solid #ddd; padding: 12px 20px; font-size: 1em; font-family: Georgia, serif; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option-btn:hover { background: #eee; border-color: #6b705c; }
        .option-btn.correct { background: #4CAF50; color: white; border-color: #4CAF50; }
        .option-btn.wrong { background: #e74c3c; color: white; border-color: #e74c3c; }
        .option-btn.disabled { pointer-events: none; }
        .option-btn.show-correct { background: #4CAF50; color: white; border-color: #4CAF50; }
        
        .feedback { margin-top: 20px; font-size: 1.1em; padding: 15px; border-radius: 8px; }
        .feedback.correct { background: #e8f5e9; color: #2e7d32; }
        .feedback.wrong { background: #ffebee; color: #c62828; }
        
        .next-btn { background: #6b705c; color: white; border: none; padding: 12px 40px; font-size: 1em; font-family: Georgia, serif; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 20px; display: none; }
        .next-btn:hover { background: #5a5f4e; }
        .next-btn.show { display: inline-block; }
        
        .loading { text-align: center; padding: 60px; color: #888; }
        a { color: #6b705c; }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="menu-overlay" onclick="toggleMenu()"></div>
    <nav class="menu">
        <a href="/">🦋 Home</a>
        <a href="/random">🎲 Random Moth</a>
        <a href="/best">⭐ Best Moths</a>
        <a href="/quiz">📝 Quiz</a>
    </nav>
    
    <header>
        <h1>📝 Moth Quiz</h1>
        <p class="subtitle">Test your moth knowledge!</p>
        <div class="score">Score: <span id="correct">0</span> / <span id="total">0</span></div>
    </header>
    
    <div id="quiz" class="quiz-container">
        <div class="loading">Loading quiz...</div>
    </div>
    
    <script>
        const GIST_ID = '13f60f151dac089590b88b9a55c4140e';
        
        let favorites = [];
        let favoriteMoths = [];
        let correctCount = 0;
        let totalCount = 0;
        let answered = false;
        
        function toggleMenu() {
            document.querySelector('.menu').classList.toggle('open');
            document.querySelector('.menu-overlay').classList.toggle('open');
        }
        
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function getRandomItems(array, count, exclude = null) {
            const filtered = exclude ? array.filter(item => item.id !== exclude.id) : array;
            return shuffle(filtered).slice(0, count);
        }
        
        function updateScore() {
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('total').textContent = totalCount;
        }
        
        function showFeedback(isCorrect, correctAnswer) {
            const container = document.getElementById('quiz');
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            
            if (isCorrect) {
                feedbackDiv.textContent = '✓ Correct!';
            } else {
                feedbackDiv.textContent = `✗ Wrong! The answer was: ${correctAnswer}`;
            }
            
            container.querySelector('.quiz-content').appendChild(feedbackDiv);
            container.querySelector('.next-btn').classList.add('show');
        }
        
        function handleAnswer(selected, correct, correctDisplay) {
            if (answered) return;
            answered = true;
            totalCount++;
            
            const isCorrect = selected === correct;
            if (isCorrect) correctCount++;
            updateScore();
            
            showFeedback(isCorrect, correctDisplay);
        }
        
        function generateQuestion() {
            answered = false;
            const container = document.getElementById('quiz');
            
            if (favoriteMoths.length < 4) {
                container.innerHTML = '<div class="loading">Need at least 4 favorites to play the quiz!</div>';
                return;
            }
            
            // For family questions, filter to moths that have family data
            const mothsWithFamily = favoriteMoths.filter(m => m.family);
            const familyPlayable = mothsWithFamily.length >= 4;

            // Pick question type randomly, skipping family if not enough data
            const questionTypes = ['name', 'scientific', 'photo'];
            if (familyPlayable) questionTypes.push('family');
            const questionType = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            
            // Pick correct moth from appropriate pool
            const pool = questionType === 'family' ? mothsWithFamily : favoriteMoths;
            const correctMoth = pool[Math.floor(Math.random() * pool.length)];
            
            // Get wrong options, deduplicated by display text to avoid duplicate answers
            const getPoolText = questionType === 'name' ? m => m.common_name
                : questionType === 'family' ? m => m.family
                : questionType === 'scientific' ? m => m.scientific_name
                : null;

            let wrongMoths = [];
            if (getPoolText) {
                const usedTexts = new Set([getPoolText(correctMoth)]);
                const shuffled = shuffle(pool.filter(m => m.id !== correctMoth.id));
                for (const m of shuffled) {
                    const text = getPoolText(m);
                    if (text && !usedTexts.has(text)) {
                        usedTexts.add(text);
                        wrongMoths.push(m);
                        if (wrongMoths.length === 3) break;
                    }
                }
                // If we couldn't find 3 unique distractors, re-roll with a different question type
                if (wrongMoths.length < 3) {
                    generateQuestion();
                    return;
                }
            } else {
                wrongMoths = getRandomItems(pool, 3, correctMoth);
            }
            
            if (questionType === 'photo') {
                // Show name, pick from 4 photos
                const allOptions = shuffle([correctMoth, ...wrongMoths]);
                
                container.innerHTML = `
                    <div class="quiz-content">
                        <div class="question">Which photo is the <strong>${correctMoth.common_name}</strong>?</div>
                        <div class="photo-grid">
                            ${allOptions.map(moth => `
                                <div class="photo-option" data-moth-id="${moth.id}" onclick="handlePhotoAnswer(${moth.id}, ${correctMoth.id}, '${correctMoth.common_name.replace(/'/g, "\\'")}', this)">
                                    <img src="${moth.photo_url}" alt="Moth option">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <button class="next-btn" onclick="generateQuestion()">Next Question →</button>
                `;
            } else {
                // Show photo, pick from 4 text options
                let question, correctAnswer, getOptionText;
                
                if (questionType === 'name') {
                    question = 'What moth is this?';
                    correctAnswer = correctMoth.common_name;
                    getOptionText = m => m.common_name;
                } else if (questionType === 'family') {
                    question = 'What family does this moth belong to?';
                    correctAnswer = correctMoth.family;
                    getOptionText = m => m.family;
                } else {
                    question = 'What is the scientific name?';
                    correctAnswer = correctMoth.scientific_name;
                    getOptionText = m => m.scientific_name;
                }
                
                const allOptions = shuffle([correctMoth, ...wrongMoths]);
                
                container.innerHTML = `
                    <img src="${correctMoth.photo_url}" alt="Quiz moth">
                    <div class="quiz-content">
                        <div class="question">${question}</div>
                        <div class="options">
                            ${allOptions.map(moth => {
                                const optionText = getOptionText(moth);
                                return `<button class="option-btn" onclick="handleTextAnswer('${optionText.replace(/'/g, "\\'")}', '${correctAnswer.replace(/'/g, "\\'")}', this)">${optionText}</button>`;
                            }).join('')}
                        </div>
                    </div>
                    <button class="next-btn" onclick="generateQuestion()">Next Question →</button>
                `;
            }
        }
        
        function handleTextAnswer(selected, correct, btn) {
            if (answered) return;
            
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.classList.add('disabled'));
            
            if (selected === correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if (b.textContent === correct) {
                        b.classList.add('show-correct');
                    }
                });
            }
            
            handleAnswer(selected, correct, correct);
        }
        
        function handlePhotoAnswer(selectedId, correctId, correctName, el) {
            if (answered) return;
            
            const allPhotos = document.querySelectorAll('.photo-option');
            allPhotos.forEach(p => p.classList.add('disabled'));
            
            if (selectedId === correctId) {
                el.classList.add('correct');
            } else {
                el.classList.add('wrong');
                allPhotos.forEach(p => {
                    if (parseInt(p.dataset.mothId) === correctId) {
                        p.classList.add('correct');
                    }
                });
            }
            
            handleAnswer(selectedId, correctId, correctName);
        }
        
        async function loadQuiz() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                const gist = await response.json();
                
                // Check if file is truncated
                const fileInfo = gist.files['sent_moths.json'];
                let mothsData;
                if (fileInfo.truncated) {
                    const rawResponse = await fetch(fileInfo.raw_url);
                    mothsData = await rawResponse.text();
                } else {
                    mothsData = fileInfo.content;
                }
                
                const allMoths = JSON.parse(mothsData);
                
                if (gist.files['favorites.json']) {
                    favorites = JSON.parse(gist.files['favorites.json'].content);
                }
                
                favoriteMoths = allMoths.filter(m => favorites.includes(m.id));
                
                generateQuestion();
            } catch (err) {
                document.getElementById('quiz').innerHTML = '<div class="loading">Error loading quiz</div>';
            }
        }
        
        loadQuiz();
    </script>
</body>
</html>
